<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Bot Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #18181b; color: white; display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { background: #2d2d2d; padding: 20px; border-radius: 12px; width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #9147ff; margin-top: 0; }
        
        .section { border-bottom:1px solid #444; padding-bottom: 20px; margin-bottom: 20px; }
        .section:last-child { border: none; }
        
        label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        
        input, select, button {
            width: 100%; padding: 10px; box-sizing: border-box;
            border-radius: 4px; border: 1px solid #444; background: #18181b; color: white;
            margin-bottom: 10px;
        }
        
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; opacity: 0.5; }
        .btn-primary { background: #9147ff; }
        .btn-primary:hover:not(:disabled) { background: #772ce8; }
        .btn-danger { background: #ff4f4d; }
        .btn-danger:hover:not(:disabled) { background: #e64644; }
        .btn-warning { background: #ff9f4d; color: white; }
        .btn-warning:hover { background: #e68e44; }
        .btn-edit { background: #444; font-size: 0.8em; padding: 5px; }
        .btn-edit:hover { background: #555; }
        .btn-connect { background: #00c853; }

        .active-item { background: #383838; padding: 10px; border-radius: 4px; margin-bottom: 10px; border-left: 4px solid #9147ff; }
        .active-info h4 { margin: 0; color: #9147ff; }
        .active-info p { margin: 2px 0; font-size: 0.85em; color: #ccc; }
        .active-actions { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .btn-sm { padding: 5px; font-size: 0.8em; flex: 1; }

        .console-box {
            background: #000; border: 1px solid #444; color: #0f0;
            font-family: 'Courier New', Courier, monospace; font-size: 12px;
            height: 150px; overflow-y: scroll; padding: 10px; margin-top: 20px;
            border-radius: 4px; text-align: left;
        }
        .log-entry { margin-bottom: 2px; border-bottom: 1px solid #111; }
        .log-time { color: #888; margin-right: 5px; }

        .links { text-align: center; margin-top: 20px; }
        .links a { color: #9147ff; text-decoration: none; margin: 0 10px; font-size: 0.9em; }
        .links a:hover { text-decoration: underline; }
        
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #9147ff; }
    </style>
</head>
<body>

    <div class="container">        
    <iframe 
            src="https://somerewardsfriday.me/pages/giveawaybotme" 
            width="100%" 
            height="500px" 
            style="border:none; border-radius:8px; margin-bottom:20px;"
            title="GiveawayBot.Me Tips">
        </iframe>

        <h2>Bot Control</h2>

        <!-- 1. Connect -->
        <div class="section">
            <label>Streamer Username:</label>
            <div style="display:flex; gap:5px; margin-bottom:0;">
                <input type="text" id="channelInput" placeholder="e.g. ninja" onchange="updateLinks()">
                <button class="btn-connect" id="btnConnect" style="width:auto;" onclick="connectBot()">Connect</button>
            </div>
        </div>

        <!-- 2. Active Giveaways List -->
        <div class="section">
            <label>Active Giveaways:</label>
            <div id="activeList">
                <p style="color: #777; font-style: italic;">No giveaways running.</p>
            </div>
        </div>

        <!-- 3. Start New Giveaway -->
        <div class="section">
            <label>Start New Giveaway:</label>
            
            <label>Load Preset (Optional):</label>
            <select id="presetSelect" onchange="loadPreset()">
                <option value="">-- Select a Preset --</option>
            </select>

            <label>Command:</label>
            <input type="text" id="cmdInput" value="!enter">

            <label>Prize Name:</label>
            <input type="text" id="prizeInput" placeholder="e.g. $10 Gift Card">
            
            <label>Winner Message (use {winner}):</label>
            <input type="text" id="msgInput" value="🎊 The winner is... {winner} !">

            <label>Timer (minutes, 0 = manual):</label>
            <input type="number" id="timerInput" placeholder="0" value="0" min="0">
            
            <div class="checkbox-row">
                <input type="checkbox" id="loopToggle">
                <label for="loopToggle" style="margin:0;">Loop this giveaway</label>
            </div>

            <button class="btn-primary" id="btnStart" onclick="startGiveaway()" disabled>Start Giveaway</button>
        </div>

        <!-- 4. Console -->
        <div class="console-box" id="console"><div class="log-entry"><span class="log-time">System:</span> Ready.</div></div>

        <div class="links">
            <a href="#" id="settingsLink">Weights & Roles</a>
            <a href="#" id="gawLink">Manage Presets</a>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isConnected = false;
        let savedPresets = [];
        let activeGiveaways = [];

        function logToScreen(msg) {
            const consoleDiv = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function updateLinks() {
            const channel = document.getElementById('channelInput').value.trim().toLowerCase();
            if (channel) {
                document.getElementById('settingsLink').href = `settings.html?user=${channel}`;
                document.getElementById('gawLink').href = `giveaways.html?user=${channel}`;
                loadPresets(channel);
            }
        }

        async function loadPresets(channel) {
            if(!channel) channel = document.getElementById('channelInput').value.trim().toLowerCase();
            if(!channel) return;
            try {
                const res = await fetch(`/api/settings?username=${channel}`);
                const data = await res.json();
                savedPresets = data.giveaways || [];
                const select = document.getElementById('presetSelect');
                select.innerHTML = '<option value="">-- Select a Preset --</option>';
                savedPresets.forEach((p, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    opt.innerText = `${p.name} (${p.command})`;
                    select.appendChild(opt);
                });
            } catch(e) { console.error(e); }
        }

        function loadPreset() {
            const idx = document.getElementById('presetSelect').value;
            if (idx === "") return; 

            const p = savedPresets[idx];
            document.getElementById('cmdInput').value = p.command;
            document.getElementById('prizeInput').value = p.prize;
            document.getElementById('msgInput').value = p.winnerMessage;
            document.getElementById('timerInput').value = p.timer || 0;
            logToScreen(`Loaded preset: ${p.name}`);
        }

        function clearInputs() {
            document.getElementById('presetSelect').value = "";
            document.getElementById('cmdInput').value = "!enter";
            document.getElementById('prizeInput').value = "";
            document.getElementById('msgInput').value = "🎊 The winner is... {winner} !";
            document.getElementById('timerInput').value = "0";
            document.getElementById('loopToggle').checked = false;
        }

        function renderActiveList() {
            const listDiv = document.getElementById('activeList');
            listDiv.innerHTML = '';

            if (activeGiveaways.length === 0) {
                listDiv.innerHTML = '<p style="color: #777; font-style: italic;">No giveaways running.</p>';
                return;
            }

            activeGiveaways.forEach((gaw) => {
                const div = document.createElement('div');
                div.className = 'active-item';
                div.innerHTML = `
                    <div class="active-info">
                        <h4>${gaw.prize}</h4>
                        <p>Command: ${gaw.command} | Entries: ${gaw.count || 0}</p>
                    </div>
                    <div class="active-actions">
                        <button class="btn-edit btn-sm" onclick="editGiveaway('${gaw.command}')">Edit</button>
                        <button class="btn-warning btn-sm" onclick="stopLoop('${gaw.command}')">Stop Loop</button>
                        <button class="btn-danger btn-sm" onclick="stopGiveaway('${gaw.command}')">Stop</button>
                    </div>
                `;
                listDiv.appendChild(div);
            });
        }

        function connectBot() {
            const channel = document.getElementById('channelInput').value.trim().toLowerCase();
            if(!channel) return alert("Enter a channel name");
            const btn = document.getElementById('btnConnect');
            btn.innerText = "Connecting...";
            btn.disabled = true;
            logToScreen(`Joining #${channel}...`);
            socket.emit('joinStreamer', channel);
        }

        function startGiveaway() {
            if(!isConnected) return logToScreen("Connect first!");
            
            const channel = document.getElementById('channelInput').value.trim().toLowerCase();
            const cmd = document.getElementById('cmdInput').value;
            const prize = document.getElementById('prizeInput').value;
            const msg = document.getElementById('msgInput').value;
            const timer = parseInt(document.getElementById('timerInput').value);
            const loop = document.getElementById('loopToggle').checked;

            if(!cmd) return alert("Command is required!");
            if(!prize) return alert("Prize is required!");

            socket.emit('startGiveaway', { channel, prize, timer, command: cmd, message: msg, loop });
            clearInputs();
        }

        function stopGiveaway(command) {
            const channel = document.getElementById('channelInput').value.trim().toLowerCase();
            socket.emit('stopGiveaway', { channel, command });
        }

        function stopLoop(command) {
            const channel = document.getElementById('channelInput').value.trim().toLowerCase();
            socket.emit('stopLoop', { channel, command });
        }

        function editGiveaway(command) {
            alert(`Edit is ready for Timer/Loop updates via server logic.\nCurrent Command: ${command}`);
        }

        socket.on('logMessage', (msg) => logToScreen(msg));
        
        socket.on('botConnected', (channel) => {
            isConnected = true;
            document.getElementById('btnConnect').innerText = "Connected";
            document.getElementById('btnConnect').disabled = true;
            document.getElementById('btnStart').disabled = false;
            logToScreen(`Connected to #${channel}`);
        });

        socket.on('giveawayStateUpdate', (stateList) => {
            activeGiveaways = stateList;
            renderActiveList();
        });
        
        socket.on('disconnect', () => {
            logToScreen('Disconnected from Dashboard Server. Retrying...', 'error');
            isConnected = false; isGiveawayActive = false;
            updateButtonStates();
            
            const btn = document.getElementById('btnConnect');
            btn.innerText = "Reconnecting...";
            
            // Try to reconnect automatically after 3 seconds
            setTimeout(() => {
                const channel = document.getElementById('channelInput').value.trim().toLowerCase();
                if(channel) {
                    logToScreen(`Attempting to auto-reconnect to #${channel}...`);
                    socket.emit('joinStreamer', channel);
                }
            }, 3000);
        });
    </script>
</body>
</html>
