<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Settings</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #18181b; color: white; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        h2 { color: #9147ff; text-align: center; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        label { font-weight: bold; font-size: 0.9em; }
        .controls { display: flex; align-items: center; gap: 10px; }
        input[type="number"] { width: 50px; padding: 5px; background: #18181b; color: white; border: 1px solid #555; border-radius: 4px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        button { width: 100%; padding: 10px; background: #9147ff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        button:hover { background: #772ce8; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #aaa; text-decoration: none; }
        .back-link:hover { color: white; }
        .hint { font-size: 0.75em; color: #777; margin-top: -10px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Giveaway Settings</h2>
        <p class="hint">Uncheck a box to ban that role from entering.</p>

        <div class="setting-row">
            <label>Default (Viewer):</label>
            <div class="controls">
                <input type="checkbox" id="allow_default" checked>
                <input type="number" id="default" value="1">
            </div>
        </div>

        <div class="setting-row">
            <label>VIP:</label>
            <div class="controls">
                <input type="checkbox" id="allow_vip" checked>
                <input type="number" id="vip" value="1"> <!-- Changed -->
            </div>
        </div>

        <div class="setting-row">
            <label>Mod:</label>
            <div class="controls">
                <input type="checkbox" id="allow_mod" checked>
                <input type="number" id="mod" value="1"> <!-- Changed -->
            </div>
        </div>

        <div class="setting-row">
            <label>Tier 1 Sub:</label>
            <div class="controls">
                <input type="checkbox" id="allow_t1" checked>
                <input type="number" id="t1" value="1"> <!-- Changed -->
            </div>
        </div>

        <div class="setting-row">
            <label>Tier 2 Sub:</label>
            <div class="controls">
                <input type="checkbox" id="allow_t2" checked>
                <input type="number" id="t2" value="1"> <!-- Changed -->
            </div>
        </div>

        <div class="setting-row">
            <label>Tier 3 Sub:</label>
            <div class="controls">
                <input type="checkbox" id="allow_t3" checked>
                <input type="number" id="t3" value="1"> <!-- Changed -->
            </div>
        </div>
        
        <div class="setting-row" style="justify-content: flex-start; gap: 10px; border: none;">
            <input type="checkbox" id="autoRestart" style="width: 18px; height: 18px;">
            <label style="font-weight: normal;">Auto-restart giveaway after it ends</label>
        </div>

        <button onclick="saveSettings()">Save Settings</button>
    </div>

    <a href="index.html" class="back-link">&larr; Back to Dashboard</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user'); 

        async function saveSettings() {
            const data = {
                weights: {
                    default: parseInt(document.getElementById('default').value),
                    vip: parseInt(document.getElementById('vip').value),
                    mod: parseInt(document.getElementById('mod').value),
                    t1: parseInt(document.getElementById('t1').value),
                    t2: parseInt(document.getElementById('t2').value),
                    t3: parseInt(document.getElementById('t3').value)
                },
                allow: {
                    default: document.getElementById('allow_default').checked,
                    vip: document.getElementById('allow_vip').checked,
                    mod: document.getElementById('allow_mod').checked,
                    t1: document.getElementById('allow_t1').checked,
                    t2: document.getElementById('allow_t2').checked,
                    t3: document.getElementById('allow_t3').checked
                },
                options: {
                    autoRestart: document.getElementById('autoRestart').checked // NEW
                }
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, weights: data.weights, allow: data.allow, options: data.options })
                });
                
                if(res.ok) {
                    alert('Settings saved successfully!');
                } else {
                    alert('Error saving settings.');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
